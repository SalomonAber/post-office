[app]
timezone = "Europe/Berlin"
state_dir = "./state"

[banlist]
sender_ids = [
  # { source = "signal", id = "+49123456789", reason = "example" },
]
chat_ids = [
  # { source = "whatsapp", id = "12345@g.us", reason = "example" },
]

[printer]
enabled = false
device_path = "/dev/rfcomm0"
width_chars = 42

[sources.signal]
enabled = false
data_dir = "./state/signal-cli"
media_dir = "./state/media/signal"
include_own_messages = false
restart_delay_seconds = 5
max_restart_delay_seconds = 300

[sources.whatsapp]
enabled = false
auth_dir = "./state/whatsapp-auth"
media_dir = "./state/media/whatsapp"
include_own_messages = false
restart_delay_seconds = 5
max_restart_delay_seconds = 300
